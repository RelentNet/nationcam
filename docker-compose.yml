services:
  # ── App Database (PostgreSQL) ──────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nationcam
      POSTGRES_USER: nationcam
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nationcam"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Go API ────────────────────────────────────────────────
  api:
    build:
      context: ./api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: "8080"
      # Overridable via the DATABASE_URL env var (e.g. a Coolify-managed Postgres).
      # Falls back to the in-compose `postgres` service when unset, so clearing
      # the env var reverts to the bundled database.
      DATABASE_URL: "${DATABASE_URL:-host=postgres port=5432 user=nationcam password=${POSTGRES_PASSWORD} dbname=nationcam sslmode=disable}"
      REDIS_URL: redis://redis:6379/0
      LOGTO_ENDPOINT: ${LOGTO_ENDPOINT:-https://auth.nationcam.com}
      LOGTO_API_RESOURCE: ${LOGTO_API_RESOURCE:-https://api.nationcam.com}
      CORS_ORIGINS: ${SERVICE_URL_WEB:-http://localhost:3000}
      # Restreamer (optional — leave empty to disable stream management)
      RESTREAMER_URL: ${RESTREAMER_URL:-}
      RESTREAMER_USER: ${RESTREAMER_USER:-}
      RESTREAMER_PASS: ${RESTREAMER_PASS:-}
      STREAMER_API_KEY: ${STREAMER_API_KEY:-}
      # AzuraCast (optional — audio-channel picker; e.g. https://phoenix3.fnit.us)
      AZURACAST_URL: ${AZURACAST_URL:-}

  # ── Web (nginx + React SPA) — LEGACY, kept for rollback ───
  # Still built and running, but no longer holds the domain after the P1c
  # cutover. To roll back: move https://nationcam.com off `web_next` and back
  # onto this service in Coolify's general tab. No rebuild required.
  web:
    build:
      context: ./web
      args:
        VITE_LOGTO_ENDPOINT: ${LOGTO_ENDPOINT:-https://auth.nationcam.com}
        VITE_LOGTO_APP_ID: ${LOGTO_APP_ID:-}
        VITE_LOGTO_API_RESOURCE: ${LOGTO_API_RESOURCE:-https://api.nationcam.com}
    restart: unless-stopped
    depends_on:
      - api

  # ── Web Next (TanStack Start SSR on Nitro) ────────────────
  # Domain set in Coolify general tab: https://nationcam.com
  # Serves /* itself and proxies /api/* to the Go API over this network, so it
  # is a drop-in replacement for the nginx `web` service on the same domain.
  # Named web_next (underscore) to match how Coolify keys the domain mapping.
  web_next:
    build:
      context: ./web-next
      args:
        VITE_LOGTO_ENDPOINT: ${LOGTO_ENDPOINT:-https://auth.nationcam.com}
        VITE_LOGTO_APP_ID: ${LOGTO_APP_ID:-}
        VITE_LOGTO_API_RESOURCE: ${LOGTO_API_RESOURCE:-https://api.nationcam.com}
    restart: unless-stopped
    environment:
      PORT: "3000"
      # Internal address. Server renders and the /api proxy must stay inside
      # the Docker network — the app refuses to start in production without it.
      API_URL: ${API_URL:-http://api:8080}
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
